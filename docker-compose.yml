services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wardrobe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wardrobe_password}
      POSTGRES_DB: ${POSTGRES_DB:-wardrobe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wardrobe} -d ${POSTGRES_DB:-wardrobe}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend-db-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      PYTHONPATH: /app
      ADMIN_SUPERUSER_LOGIN: ${ADMIN_SUPERUSER_LOGIN}
      ADMIN_SUPERUSER_PASSWORD: ${ADMIN_SUPERUSER_PASSWORD}
      ADMIN_ACCESS_TOKEN_TTL_SEC: ${ADMIN_ACCESS_TOKEN_TTL_SEC:-86400}
      ADMIN_REFRESH_TOKEN_TTL_SEC: ${ADMIN_REFRESH_TOKEN_TTL_SEC:-604800}
      ADMIN_TOKEN_SECRET: ${ADMIN_TOKEN_SECRET}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  service-db-init:
    build:
      context: ./service
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      PYTHONPATH: /app
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      SERVICE_BASE_URL: ${SERVICE_BASE_URL:-http://service:8000}
      SERVICE_PROXY_CONNECT_TIMEOUT_SEC: ${SERVICE_PROXY_CONNECT_TIMEOUT_SEC:-10}
      SERVICE_PROXY_READ_TIMEOUT_SEC: ${SERVICE_PROXY_READ_TIMEOUT_SEC:-120}
      IMAGE_PROXY_TIMEOUT_SEC: ${IMAGE_PROXY_TIMEOUT_SEC:-10}
      IMAGE_PROXY_MAX_BYTES: ${IMAGE_PROXY_MAX_BYTES:-8000000}
      IMAGE_CACHE_MAX_AGE_SEC: ${IMAGE_CACHE_MAX_AGE_SEC:-86400}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      IMAGE_CACHE_REDIS_TTL_SEC: ${IMAGE_CACHE_REDIS_TTL_SEC:-259200}
      IMAGE_RATE_LIMIT_PER_MINUTE: ${IMAGE_RATE_LIMIT_PER_MINUTE:-120}
      PRICING_BYBIT_RATE_AUTO_ENABLED: ${PRICING_BYBIT_RATE_AUTO_ENABLED:-true}
      PRICING_BYBIT_RATE_CACHE_SEC: ${PRICING_BYBIT_RATE_CACHE_SEC:-300}
      PRICING_BYBIT_RATE_TIMEOUT_SEC: ${PRICING_BYBIT_RATE_TIMEOUT_SEC:-12}
      PRICING_BYBIT_FIAT: ${PRICING_BYBIT_FIAT:-RUB}
      PRICING_BYBIT_ASSET: ${PRICING_BYBIT_ASSET:-USDT}
      PRICING_BYBIT_ADS_LIMIT: ${PRICING_BYBIT_ADS_LIMIT:-60}
      PRICING_BYBIT_BUCKET_STEP_USDT: ${PRICING_BYBIT_BUCKET_STEP_USDT:-50}
      PRICING_BYBIT_BUCKET_MAX_USDT: ${PRICING_BYBIT_BUCKET_MAX_USDT:-5000}
      PRICING_BYBIT_OUTLIER_MAX_DEVIATION_RATIO: ${PRICING_BYBIT_OUTLIER_MAX_DEVIATION_RATIO:-0.08}
      ADMIN_SUPERUSER_LOGIN: ${ADMIN_SUPERUSER_LOGIN}
      ADMIN_SUPERUSER_PASSWORD: ${ADMIN_SUPERUSER_PASSWORD}
      ADMIN_ACCESS_TOKEN_TTL_SEC: ${ADMIN_ACCESS_TOKEN_TTL_SEC:-86400}
      ADMIN_REFRESH_TOKEN_TTL_SEC: ${ADMIN_REFRESH_TOKEN_TTL_SEC:-604800}
      ADMIN_TOKEN_SECRET: ${ADMIN_TOKEN_SECRET}
    expose:
      - "8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-db-init:
        condition: service_completed_successfully
      service-db-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.workers.bybit_rate_worker"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      PRICING_BYBIT_RATE_AUTO_ENABLED: ${PRICING_BYBIT_RATE_AUTO_ENABLED:-true}
      PRICING_BYBIT_RATE_CACHE_SEC: ${PRICING_BYBIT_RATE_CACHE_SEC:-300}
      PRICING_BYBIT_RATE_TIMEOUT_SEC: ${PRICING_BYBIT_RATE_TIMEOUT_SEC:-12}
      PRICING_BYBIT_FIAT: ${PRICING_BYBIT_FIAT:-RUB}
      PRICING_BYBIT_ASSET: ${PRICING_BYBIT_ASSET:-USDT}
      PRICING_BYBIT_ADS_LIMIT: ${PRICING_BYBIT_ADS_LIMIT:-60}
      PRICING_BYBIT_BUCKET_STEP_USDT: ${PRICING_BYBIT_BUCKET_STEP_USDT:-50}
      PRICING_BYBIT_BUCKET_MAX_USDT: ${PRICING_BYBIT_BUCKET_MAX_USDT:-5000}
      PRICING_BYBIT_OUTLIER_MAX_DEVIATION_RATIO: ${PRICING_BYBIT_OUTLIER_MAX_DEVIATION_RATIO:-0.08}
      PRICING_BYBIT_WORKER_INTERVAL_SEC: ${PRICING_BYBIT_WORKER_INTERVAL_SEC:-10800}
    depends_on:
      postgres:
        condition: service_healthy
      backend-db-init:
        condition: service_completed_successfully
      service-db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  service:
    build:
      context: ./service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      PARSER_SOURCES_FILE: ${PARSER_SOURCES_FILE}
      PARSER_DEFAULT_TIMEOUT_SEC: ${PARSER_DEFAULT_TIMEOUT_SEC}
      PARSER_DEFAULT_MAX_PRODUCTS: ${PARSER_DEFAULT_MAX_PRODUCTS}
      PARSER_DEFAULT_SAMPLE_PRODUCTS: ${PARSER_DEFAULT_SAMPLE_PRODUCTS}
      PARSER_DEFAULT_PARALLEL_WORKERS: ${PARSER_DEFAULT_PARALLEL_WORKERS}
      PARSER_DEFAULT_MAX_RETRIES: ${PARSER_DEFAULT_MAX_RETRIES}
      PARSER_DEFAULT_RETRY_BACKOFF_SEC: ${PARSER_DEFAULT_RETRY_BACKOFF_SEC}
      PARSER_DEFAULT_SECOND_PASS_ENABLED: ${PARSER_DEFAULT_SECOND_PASS_ENABLED}
      PARSER_DEFAULT_SECOND_PASS_TIMEOUT_SEC: ${PARSER_DEFAULT_SECOND_PASS_TIMEOUT_SEC}
      PARSER_CRAWLEE_NODE_BIN: ${PARSER_CRAWLEE_NODE_BIN:-node}
      PARSER_CRAWLEE_SCRIPT_PATH: ${PARSER_CRAWLEE_SCRIPT_PATH:-crawlee/src/cli.mjs}
      PARSER_CRAWLEE_MAX_PRODUCTS: ${PARSER_CRAWLEE_MAX_PRODUCTS:-5000}
      PARSER_CRAWLEE_TIMEOUT_SEC: ${PARSER_CRAWLEE_TIMEOUT_SEC:-20}
      PARSER_CRAWLEE_PROCESS_TIMEOUT_SEC: ${PARSER_CRAWLEE_PROCESS_TIMEOUT_SEC:-300}
      PARSER_CRAWLEE_MAX_DISCOVERY_PAGES: ${PARSER_CRAWLEE_MAX_DISCOVERY_PAGES:-80}
      PARSER_CRAWLEE_MAX_CONCURRENCY: ${PARSER_CRAWLEE_MAX_CONCURRENCY:-8}
      PARSER_CRAWLEE_MAX_RETRIES: ${PARSER_CRAWLEE_MAX_RETRIES:-1}
      PARSER_BROWSER_FALLBACK_ENABLED: ${PARSER_BROWSER_FALLBACK_ENABLED:-true}
      PARSER_BROWSER_FALLBACK_MIN_SUCCESS_RATIO: ${PARSER_BROWSER_FALLBACK_MIN_SUCCESS_RATIO:-0.85}
      PARSER_BROWSER_NODE_BIN: ${PARSER_BROWSER_NODE_BIN:-node}
      PARSER_BROWSER_SCRIPT_PATH: ${PARSER_BROWSER_SCRIPT_PATH:-browser-parser/src/index.mjs}
      PARSER_BROWSER_BINARY: ${PARSER_BROWSER_BINARY:-chromium}
      PARSER_BROWSER_PROCESS_TIMEOUT_SEC: ${PARSER_BROWSER_PROCESS_TIMEOUT_SEC:-1200}
      PARSER_BROWSER_WAIT_EXTENSION_TIMEOUT_MS: ${PARSER_BROWSER_WAIT_EXTENSION_TIMEOUT_MS:-120000}
      PARSER_BROWSER_MAX_PRODUCT_SITEMAPS: ${PARSER_BROWSER_MAX_PRODUCT_SITEMAPS:-128}
      PARSER_BROWSER_JS_SAMPLE_SIZE: ${PARSER_BROWSER_JS_SAMPLE_SIZE:-120}
      PARSER_BROWSER_EXPORT_CONCURRENCY: ${PARSER_BROWSER_EXPORT_CONCURRENCY:-8}
      PARSER_BROWSER_FORCE_LIVE_FALLBACK: ${PARSER_BROWSER_FORCE_LIVE_FALLBACK:-false}
      PARSER_DEFAULT_ERROR_DETAILS_LIMIT: ${PARSER_DEFAULT_ERROR_DETAILS_LIMIT:-200}
      PARSER_DISCOVERY_SAFETY_LIMIT: ${PARSER_DISCOVERY_SAFETY_LIMIT:-2000}
      PARSER_DISCOVERY_COLLECTIONS_SAFETY_LIMIT: ${PARSER_DISCOVERY_COLLECTIONS_SAFETY_LIMIT:-300}
      PARSER_DISCOVERY_SITEMAP_WORKERS: ${PARSER_DISCOVERY_SITEMAP_WORKERS}
      PARSER_DISCOVERY_FAIL_FAST_ON_RATE_LIMIT: ${PARSER_DISCOVERY_FAIL_FAST_ON_RATE_LIMIT}
      PARSER_SHOPIFY_PAGE_SIZE: ${PARSER_SHOPIFY_PAGE_SIZE:-250}
      PARSER_DISCOVERY_WARNING_ITEMS_LIMIT: ${PARSER_DISCOVERY_WARNING_ITEMS_LIMIT:-20}
      PARSER_SECOND_PASS_MAX_WORKERS: ${PARSER_SECOND_PASS_MAX_WORKERS}
      PARSER_SECOND_PASS_MIN_BACKOFF_SEC: ${PARSER_SECOND_PASS_MIN_BACKOFF_SEC}
      PARSER_RATE_LIMIT_MIN_COOLDOWN_SEC: ${PARSER_RATE_LIMIT_MIN_COOLDOWN_SEC}
      PARSER_RATE_LIMIT_JITTER_SEC: ${PARSER_RATE_LIMIT_JITTER_SEC}
      PARSER_TIMEOUT_COOLDOWN_SEC: ${PARSER_TIMEOUT_COOLDOWN_SEC}
      PARSER_SOURCE_TIMEOUT_SEC: ${PARSER_SOURCE_TIMEOUT_SEC}
      PARSER_CIRCUIT_BREAKER_429_THRESHOLD: ${PARSER_CIRCUIT_BREAKER_429_THRESHOLD}
      PARSER_CIRCUIT_BREAKER_MAX_PENALTY: ${PARSER_CIRCUIT_BREAKER_MAX_PENALTY}
      PARSER_CIRCUIT_BREAKER_RECOVERY_SUCCESSES: ${PARSER_CIRCUIT_BREAKER_RECOVERY_SUCCESSES}
      PARSER_CIRCUIT_BREAKER_PAUSE_SEC: ${PARSER_CIRCUIT_BREAKER_PAUSE_SEC}
      PARSER_SYNC_MAX_SOURCES: ${PARSER_SYNC_MAX_SOURCES:-0}
      PARSER_SYNC_SOURCE_WORKERS: ${PARSER_SYNC_SOURCE_WORKERS}
      PARSER_SYNC_PERIOD_MINUTES: ${PARSER_SYNC_PERIOD_MINUTES:-300}
      PARSER_JOB_STALE_MINUTES: ${PARSER_JOB_STALE_MINUTES:-180}
      IMAGE_PROXY_TIMEOUT_SEC: ${IMAGE_PROXY_TIMEOUT_SEC:-10}
      IMAGE_PROXY_MAX_BYTES: ${IMAGE_PROXY_MAX_BYTES:-8000000}
      IMAGE_CACHE_MAX_AGE_SEC: ${IMAGE_CACHE_MAX_AGE_SEC:-86400}
      IMAGE_RATE_LIMIT_PER_MINUTE: ${IMAGE_RATE_LIMIT_PER_MINUTE:-120}
    depends_on:
      postgres:
        condition: service_healthy
      service-db-init:
        condition: service_completed_successfully
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
