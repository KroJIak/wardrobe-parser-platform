services:
  postgres:
    image: postgres:15-alpine
    container_name: example-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-example_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-example_secret}
      POSTGRES_DB: ${POSTGRES_DB:-example_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-example_port}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-example_user} -d ${POSTGRES_DB:-example_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - example-network

  db-init:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: example-db-init
    working_dir: /app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-example_user}:${POSTGRES_PASSWORD:-example_secret}@postgres:5432/${POSTGRES_DB:-example_db}
      - PYTHONPATH=/app
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - example-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: example-api
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-example_user}:${POSTGRES_PASSWORD:-example_secret}@postgres:5432/${POSTGRES_DB:-example_db}
    ports:
      - "${API_PORT:-example_port}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - example-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://example}
    container_name: example-frontend
    ports:
      - "${FRONTEND_PORT:-example_port}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - example-network

volumes:
  postgres_data:

networks:
  example-network:
    driver: bridge
